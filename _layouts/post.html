<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css">
    <script src="../../../assets/js/index.js"></script>
</head>
<body>
    <div id="top-bar">
        <!-- Top bar is in a line going {Title(id="pg-title") About Home} -->
        <div id="pg-title">{{ site.title }}</div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <button type="button" onclick="toggleDarkMode(this)" id="mode-button">hello</button>
    </div>
    <div id="content">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
        {{ content }}
    </div>
    <a href="https://github.com/Captainexpo-1"><img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="" 
        style="position: fixed; right: 5px; bottom: 5px; border: 0; max-width: 30px;"
    ></a>
</body>
<footer>
    <div id="graphcomment"></div>
    <script type="text/javascript">

    /* - - - CONFIGURATION VARIABLES - - - */

    var __semio__params = {
        graphcommentId: "PersonalWebsite", // make sure the id is yours

        behaviour: {
        // HIGHLY RECOMMENDED
        //  uid: "...", // uniq identifer for the comments thread on your page (ex: your page id)
        },

        // configure your variables here

    }

    /* - - - DON'T EDIT BELOW THIS LINE - - - */

    function __semio__onload() {
        __semio__gc_graphlogin(__semio__params)
    }


    (function() {
        var gc = document.createElement('script'); gc.type = 'text/javascript'; gc.async = true;
        gc.onload = __semio__onload; gc.defer = true; gc.src = 'https://integration.graphcomment.com/gc_graphlogin.js?' + Date.now();
        (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(gc);
    })();
    

    </script>
</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
<script>checkDark()</script>
</html>
